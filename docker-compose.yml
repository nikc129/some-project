version: '3.9'

services:

  app:
    build: .
    container_name: ecommerce-app
    ports:
      - "5000:5000"

    restart: always

  prometheus:
    image: prom/prometheus
    container_name: prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

    depends_on:
      - app

    restart: always

  grafana:
    image: grafana/grafana
    container_name: grafana

    ports:
      - "3000:3000"

    depends_on:
      - prometheus

    restart: always

    volumes:
      - grafana-storage:/var/lib/grafana

volumes:
  grafana-storage: